// ============ Edge Drag ============

let dragState = null;
function bindEdgeDrag() {
  document.querySelectorAll(".edge-handle-v, .edge-handle-h").forEach(h => {
    h.addEventListener("mousedown", onEdgeMouseDown);
  });
}
function onEdgeMouseDown(evt) {
  evt.preventDefault();
  evt.stopPropagation();
  const handle = evt.currentTarget;
  const floor = parseInt(handle.getAttribute("data-floor"), 10);
  const edgeIdx = parseInt(handle.getAttribute("data-edge-idx"), 10);
  const edges = getRoomEdges(state.workingRooms, floor);
  const edge = edges[edgeIdx];
  if (!edge) return;
  handle.classList.add("dragging");
  dragState = { floor, edge, startMouseX: evt.clientX, startMouseY: evt.clientY,
    initialRooms: state.workingRooms.map(r => ({ ...r })), handle };
  document.body.style.cursor = (edge.type === "V") ? "ew-resize" : "ns-resize";
  document.addEventListener("mousemove", onEdgeMouseMove);
  document.addEventListener("mouseup", onEdgeMouseUp);
}
function onEdgeMouseMove(evt) {
  if (!dragState) return;
  const e = dragState.edge;
  const initialRooms = dragState.initialRooms;
  const dx = evt.clientX - dragState.startMouseX;
  const dy = evt.clientY - dragState.startMouseY;
  // 1/4 グリッド (22.75cm) 単位に丸める
  const SNAP = 4;
  let dGrid;
  if (e.side === "east")  dGrid =  Math.round(dx / GRID_PX * SNAP) / SNAP;
  else if (e.side === "west")  dGrid = -Math.round(dx / GRID_PX * SNAP) / SNAP;
  else if (e.side === "north") dGrid = -Math.round(dy / GRID_PX * SNAP) / SNAP;
  else if (e.side === "south") dGrid =  Math.round(dy / GRID_PX * SNAP) / SNAP;
  if (dGrid === 0) {
    state.workingRooms = initialRooms.map(r => ({ ...r }));
    renderOutput(); updateOptionStatus(); return;
  }
  // 自由配置モード: dragged room のみリサイズ。他の部屋はそのまま。
  const next = initialRooms.map(r => ({ ...r }));
  const target = next[e.roomIdx];
  if (e.side === "east") {
    const newW = target.w + dGrid;
    if (newW >= 1) target.w = newW;
  } else if (e.side === "west") {
    const newW = target.w + dGrid;
    if (newW >= 1) { target.x = target.x - dGrid; target.w = newW; }
  } else if (e.side === "north") {
    const newH = target.h + dGrid;
    if (newH >= 1) target.h = newH;
  } else if (e.side === "south") {
    const newH = target.h + dGrid;
    if (newH >= 1) { target.y = target.y - dGrid; target.h = newH; }
  }
  target.tatami = (target.w * target.h) / 2;
  state.workingRooms = next;
  renderOutput();
  updateOptionStatus();
}
function onEdgeMouseUp() {
  if (dragState && dragState.handle) dragState.handle.classList.remove("dragging");
  document.body.style.cursor = "";
  dragState = null;
  document.removeEventListener("mousemove", onEdgeMouseMove);
  document.removeEventListener("mouseup", onEdgeMouseUp);
}

// ============ Option Status ============

function getOptionStatus(opt, rooms) {
  // 欠落バッジを「クリックで追加」可能にする(Plan B)
  const addBadge = (floor) => `<span class="ng add-clickable" data-add-type="${opt}" data-add-floor="${floor}" title="クリックで${floor}Fに追加">✗${floor}F (＋追加)</span>`;
  if (MULTI_FLOOR_OPTIONS.includes(opt)) {
    const c1 = document.querySelector(`input[name="opt-${opt}-1"]`);
    const c2 = document.querySelector(`input[name="opt-${opt}-2"]`);
    const want1 = c1 && c1.checked, want2 = c2 && c2.checked;
    const has1 = templateHas(rooms, opt, 1), has2 = templateHas(rooms, opt, 2);
    const parts = [];
    if (want1) parts.push(has1 ? `<span class="ok">✓1F</span>` : addBadge(1));
    else if (has1) parts.push(`<span class="extra">余1F</span>`);
    if (want2) parts.push(has2 ? `<span class="ok">✓2F</span>` : addBadge(2));
    else if (has2) parts.push(`<span class="extra">余2F</span>`);
    return parts.join(' ');
  }
  if (COUNT_OPTIONS.includes(opt)) {
    const checked = document.querySelector(`input[name="opt-${opt}"]:checked`);
    const cntSelect = document.querySelector(`select[name="opt-${opt}-count"]`);
    if (!checked || checked.value === "none") {
      const got = countRooms(rooms, opt);
      return got > 0 ? `<span class="extra">余${got}部屋</span>` : '';
    }
    const floor = parseInt(checked.value, 10);
    const want = parseInt(cntSelect.value, 10);
    const got = countRooms(rooms, opt, floor);
    if (got === want) return `<span class="ok">✓${floor}F ${got}部屋</span>`;
    if (got < want) return `<span class="warn add-clickable" data-add-type="${opt}" data-add-floor="${floor}" title="クリックで追加">△${floor}F ${got}/${want} (＋)</span>`;
    return `<span class="warn">△${floor}F ${got}/${want}部屋</span>`;
  }
  const checked = document.querySelector(`input[name="opt-${opt}"]:checked`);
  if (!checked || checked.value === "none") {
    if (templateHas(rooms, opt)) return `<span class="extra">余</span>`;
    return '';
  }
  const wantFloor = parseInt(checked.value, 10);
  if (templateHas(rooms, opt, wantFloor)) return `<span class="ok">✓${wantFloor}F</span>`;
  if (templateHas(rooms, opt)) {
    const otherFloor = wantFloor === 1 ? 2 : 1;
    return `<span class="warn">△${otherFloor}F</span>`;
  }
  return addBadge(wantFloor);
}

function updateOptionStatus() {
  const rows = document.querySelectorAll(".opt-row");
  if (!state.workingRooms) {
    rows.forEach(r => { const s = r.querySelector(".opt-status"); if (s) s.innerHTML = ''; });
    return;
  }
  // ✗欠落 / △不足 バッジクリックで追加(Plan B)
  setTimeout(() => {
    document.querySelectorAll(".add-clickable").forEach(el => {
      el.onclick = () => {
        const type = el.getAttribute("data-add-type");
        const floor = parseInt(el.getAttribute("data-add-floor"), 10);
        const def = DEFAULT_ROOM_SIZE[type] || [2, 2];
        addRoomToWorking(type, floor, def[0], def[1]);
      };
    });
  }, 0);
  for (let i = 0; i < SELECTABLE_ORDER.length; i++) {
    const opt = SELECTABLE_ORDER[i];
    const row = rows[i];
    if (!row) continue;
    const status = row.querySelector(".opt-status");
    if (status) status.innerHTML = getOptionStatus(opt, state.workingRooms);
  }
}

// ============ PNG Export ============

async function exportPNG() {
  const t = state.workingTemplate, rooms = state.workingRooms;
  if (!t || !rooms) return;
  const scale = GRID_PX * 2;
  const titleH = 100;
  const dPng = computeFloorDims(t.landGridW, t.landGridH, scale);
  const oneH = dPng.totalH;
  const oneW = dPng.totalW;
  const labelH = 50; // キャンバス上のフロアラベル領域
  // PNG では1F+2Fを並べて出力(タブ切替に関係なく完全な記録)
  const totalH = titleH + 2 * (labelH + oneH) + 80;
  const totalW = oneW + 80;
  const canvas = document.createElement("canvas");
  canvas.width = totalW; canvas.height = totalH;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, totalW, totalH);
  ctx.fillStyle = "#222"; ctx.font = "bold 28px sans-serif";
  ctx.fillText(t.name, 40, 40);
  ctx.font = "16px sans-serif"; ctx.fillStyle = "#666";
  const choku = calcChokkaritsu(rooms, t.landGridW, t.landGridH);
  const ckTxt = choku ? `直下率: ${(choku.ratio*100).toFixed(1)}%` : "";
  ctx.fillText(`土地: ${state.lastInput.landWidthM}m × ${state.lastInput.landHeightM}m / ${ckTxt}`, 40, 65);
  const am = computeAreaMetrics(rooms);
  if (am) {
    ctx.font = "14px sans-serif";
    ctx.fillStyle = "#555";
    const line = `LDK比率 ${(am.ldkRatio*100).toFixed(1)}% / 収納率 ${(am.storageRatio*100).toFixed(1)}% / 廊下率 ${(am.hallwayRatio*100).toFixed(1)}% / 有効率 ${(am.effectiveRatio*100).toFixed(1)}%`;
    ctx.fillText(line, 40, 90);
  }

  const startY = titleH;
  for (let i = 0; i < 2; i++) {
    const floor = (i === 0) ? 1 : 2;
    const segY = startY + i * (labelH + oneH + 30);
    // キャンバス上に階ラベルを直接描画(SVGとは別に確実に表示)
    ctx.fillStyle = "#2c5aa0";
    ctx.fillRect(40, segY, 180, labelH);
    ctx.fillStyle = "white";
    ctx.font = "bold 26px sans-serif";
    ctx.textBaseline = "alphabetic";
    ctx.fillText(`${floor}F 平面図`, 56, segY + 34);
    // SVG をラベルの下に描画
    const svgString = renderFloor(rooms, floor, t.landGridW, t.landGridH, scale, false, false);
    const blob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    await new Promise((res, rej) => {
      const img = new Image();
      img.onload = () => { ctx.drawImage(img, 40, segY + labelH); URL.revokeObjectURL(url); res(); };
      img.onerror = rej; img.src = url;
    });
  }
  ctx.font = "12px sans-serif"; ctx.fillStyle = "#999";
  ctx.fillText("Generated by 間取り図ツール (プロトタイプ) / 参考イメージ", 40, totalH - 20);
  canvas.toBlob(blob => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    const ts = new Date().toISOString().slice(0,16).replace(/[-T:]/g, "");
    a.download = `madori_${ts}.png`;
    document.body.appendChild(a); a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 100);
  }, "image/png");
}

// ============ Init ============
renderOptionsUI();

// Delete / Backspace キーで選択中の部屋を削除
document.addEventListener("keydown", (e) => {
  if (e.key !== "Delete" && e.key !== "Backspace") return;
  // 入力欄でのタイピング中は削除を発動しない
  const target = e.target;
  if (target && (target.tagName === "INPUT" || target.tagName === "SELECT" || target.tagName === "TEXTAREA" || target.isContentEditable)) {
    return;
  }
  if (state.selectedRoomIdx !== null && state.workingRooms) {
    e.preventDefault();
    deleteRoomFromWorking(state.selectedRoomIdx);
  }
});

// 文書レベルのフォールバック: 回転ボタンの確実な反応
document.addEventListener("mousedown", (e) => {
  let target = e.target;
  while (target && target !== document.body) {
    if (target.getAttribute && target.getAttribute("data-kitchen-rotate") === "1") {
      console.log("[DOC-CAPTURE] 回転ボタン捕捉(mousedown)");
      e.stopPropagation();
      e.preventDefault();
      onKitchenRotate(e);
      return;
    }
    target = target.parentNode;
  }
}, true); // capture phase
document.addEventListener("click", (e) => {
  let target = e.target;
  while (target && target !== document.body) {
    if (target.getAttribute && target.getAttribute("data-kitchen-rotate") === "1") {
      console.log("[DOC-CAPTURE] 回転ボタン捕捉(click)");
      e.stopPropagation();
      e.preventDefault();
      onKitchenRotate(e);
      return;
    }
    target = target.parentNode;
  }
}, true);

// キッチンUI のリアルタイム反映(再生成不要)
function applyKitchenInputChange() {
  const ldk = findLDK();
  if (!ldk || !ldk.kitchen) return;
  const w = parseInt(document.getElementById("kitchenWidth").value, 10);
  const wall = document.getElementById("kitchenWall").value;
  ldk.kitchen.width = w;
  const pos = defaultKitchenPosition(wall, ldk.w * 910, ldk.h * 910, w, ldk.kitchen.depth);
  ldk.kitchen.x_mm = pos.x_mm;
  ldk.kitchen.y_mm = pos.y_mm;
  ldk.kitchen.rotation = pos.rotation;
  renderOutput();
  updateOptionStatus();
}
document.getElementById("kitchenWidth").addEventListener("change", applyKitchenInputChange);
document.getElementById("kitchenWall").addEventListener("change", applyKitchenInputChange);

  state.buildingPosition.h = document.getElementById("bpH").value;
